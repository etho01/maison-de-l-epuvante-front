apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-frontend
  namespace: maison-epouvante-front
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "maison-epouvante-front-app"
          serviceAccountRef:
            name: "vault-auth"
